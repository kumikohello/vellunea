<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visuals | VELLUNEA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #c087a6; /* soft mauve/pink-lavender */
    }

    html {
      scroll-behavior: smooth;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #0e0e0e;
      color: #f4f4f4;
      font-family: 'Montserrat', sans-serif;
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    .logo-circle {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: var(--accent);
      color: #1a1a2e;
      font-family: 'Great Vibes';
      font-weight: bold;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      z-index: 1000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      line-height: 1;
      padding-top: 4px;
      padding-left: 1px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .visual-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .visual-grid img {
      width: 100%;
      filter: brightness(90%);
      transition: 0.3s;
    }

    .visual-grid img:hover {
      filter: brightness(105%);
    }

    a {
      color: #f4f4f4;
      text-decoration: none;
    }

    a:hover {
        color: var(--accent);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2.5rem;
        letter-spacing: 0.1em;
      }

      body {
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body>
  <a class="logo-circle" href="/vellunea/">V</a>
  <h1>Visuals</h1>
  <p>Dark tones. Moonlight. Fog. Objects with history. Everything has a texture. 
    see more on <a href="https://instagram.com/vellunea.music" target="_blank" style="color:#f4f4f4;">@vellunea.music</a>.</p>
  <div class="visual-grid">
    <img src="images/fog.jpg" alt="foggy landscape" />
      <img src="images/rain.jpg" alt="rain on window" />
      <img src="images/piano.jpg" alt="piano" />
      <img src="images/staircase.jpg" alt="gothic staircase" />
      <img src="images/window.jpg" alt="moonlight window" />
      <img src="images/water.jpg" alt="light on water" />
  </div>
  <p style="margin-top: 30px;"><a href="/vellunea/">&larr; Back to home</a></p>
</body>
</html>
